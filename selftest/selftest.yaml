---
- name: Ansilume Self-Test
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    selftest_message: "Hello from Ansilume!"

  tasks:
    - name: Print welcome message
      ansible.builtin.debug:
        msg: "{{ selftest_message }}"

    - name: Check Python version
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false

    - name: Show Python version
      ansible.builtin.debug:
        msg: "Python: {{ python_version.stdout }}"

    - name: Check Ansible version
      ansible.builtin.command: ansible --version
      register: ansible_version_out
      changed_when: false

    - name: Show Ansible version (first line)
      ansible.builtin.debug:
        msg: "{{ ansible_version_out.stdout_lines[0] }}"

    - name: Gather hostname fact
      ansible.builtin.debug:
        msg: "Running on host: {{ ansible_hostname }}"

    - name: Write a temp file (demonstrates a change)
      ansible.builtin.copy:
        content: "selftest ran at {{ ansible_date_time.iso8601 }}\n"
        dest: /tmp/ansilume_selftest.txt
        mode: '0644'

    - name: Read back the temp file
      ansible.builtin.slurp:
        src: /tmp/ansilume_selftest.txt
      register: selftest_file

    - name: Show file content
      ansible.builtin.debug:
        msg: "{{ selftest_file.content | b64decode | trim }}"

    - name: Simulate a skipped task
      ansible.builtin.debug:
        msg: "This task is skipped intentionally"
      when: false

    - name: All checks passed
      ansible.builtin.debug:
        msg: "Self-test complete. Ansilume runner is operational."
