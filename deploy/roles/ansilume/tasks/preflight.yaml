---
- name: Check that Docker is installed
  ansible.builtin.command: docker --version
  changed_when: false
  register: _docker_version
  failed_when: _docker_version.rc != 0

- name: Check that Docker Compose plugin is installed
  ansible.builtin.command: docker compose version
  changed_when: false
  register: _compose_version
  failed_when: _compose_version.rc != 0

- name: Check that Docker daemon is running
  ansible.builtin.service_facts:

- name: Fail if Docker service is not running
  ansible.builtin.assert:
    that:
      - "'docker.service' in ansible_facts.services"
      - "ansible_facts.services['docker.service'].state == 'running'"
    fail_msg: >-
      Docker is installed but the docker.service is not running.
      Start it with: systemctl start docker
    quiet: true

- name: Show Docker versions
  ansible.builtin.debug:
    msg: "{{ _docker_version.stdout }} / {{ _compose_version.stdout }}"
